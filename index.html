<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Hansika 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

/* RESET */
html, body {
  margin:0;
  padding:0;
  height:100%;
  font-family:'Poppins',sans-serif;
  color:white;
}

/* 🔥 FULLSCREEN BACKGROUND FIX */
#bgSlider {
  position: fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  z-index:-100;
  overflow:hidden;
}

#bgSlider img {
  position:absolute;
  top:50%;
  left:50%;
  min-width:100vw;
  min-height:100vh;
  transform:translate(-50%,-50%);
  object-fit:cover;
  opacity:0;
  transition:opacity 1.5s ease-in-out;
}

/* OVERLAY */
body::after {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:-50;
}

/* CENTER */
body{
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(18px);
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:420px;
  box-shadow:0 0 30px rgba(255,255,255,0.2);
}

/* TEXT */
h1{
  font-size:clamp(24px,5vw,40px);
  text-shadow:0 0 12px pink;
}
p{
  font-size:clamp(16px,3vw,20px);
}

/* BUTTON */
.btn{
  padding:12px 25px;
  border:none;
  border-radius:12px;
  margin:10px;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.1);
}

/* INPUT */
input{
  padding:10px;
  border-radius:10px;
  border:none;
}

/* PORTRAIT */
.portrait{
  width:200px;
  border-radius:20px;
}

/* SUCCESS MESSAGE */
.success{
  color:#00ffd5;
  margin-top:10px;
}

/* CONFESSION */
#confession{
  line-height:1.7;
  text-shadow:0 0 10px white;
}

/* FINAL WORD */
.word{
  opacity:0;
  display:inline-block;
  margin:4px;
  animation:fadeWord 0.5s forwards;
}
@keyframes fadeWord{
  to{opacity:1;}
}

/* HEARTS */
.heart{
  position:fixed;
  animation:float 6s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* HIDE */
#step2,#step3,#step4,#finalYesPage{display:none;}

/* NO BTN */
#noBtn{position:absolute;}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="bgSlider">
<img src="photo1.jpeg">
<img src="photo2.jpeg">
<img src="photo3.jpeg">
<img src="photo4.jpeg">
</div>

<div class="card">

<h1>Hey Hansika 😊</h1>

<!-- STEP 1 -->
<div id="step1">
<p>When did I message you for the first time? 😊</p>
<input id="code1">
<br><br>
<button onclick="check1()" class="btn">Next ➡️</button>
<div id="msg1" class="success"></div>
</div>

<!-- STEP 2 -->
<div id="step2">
<p>When did I send you the portrait? 🎨</p>
<input id="code2">
<br><br>
<button onclick="check2()" class="btn">Next ➡️</button>
<div id="msg2" class="success"></div>
</div>

<!-- STEP 3 -->
<div id="step3">
<img src="hansika.jpeg" class="portrait">
<p>Our common interest? 🎬</p>
<input id="code3">
<br><br>
<button onclick="check3()" class="btn">Next ➡️</button>
<div id="msg3" class="success"></div>
</div>

<!-- STEP 4 -->
<div id="step4">
<p id="confession"></p>

<h3>Do you feel the same? 😊</h3>
<button id="yesBtn" class="btn" style="background:green;">Yes 💚</button>
<button id="noBtn" class="btn" style="background:red;">No 💔</button>
</div>

<!-- FINAL -->
<div id="finalYesPage">
<h1 id="finalText"></h1>
<p id="finalPara"></p>
</div>

</div>

<audio id="song" loop>
<source src="song.mp3">
</audio>

<script>

/* SLIDESHOW */
const slides=document.querySelectorAll("#bgSlider img");
let i=0;
setInterval(()=>{
slides.forEach((img,index)=>{
img.style.opacity=(index===i)?"1":"0";
});
i=(i+1)%slides.length;
},3000);

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerText="💖";
h.style.left=Math.random()*100+"%";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},500);

/* STEP 1 */
function check1(){
if(code1.value==="0203"){
msg1.innerText="Impressive… you remember it perfectly ✨";
setTimeout(()=>{
step1.style.display="none";
step2.style.display="block";
},1200);
}
}

/* STEP 2 */
function check2(){
if(code2.value==="2103"){
msg2.innerText="That moment clearly meant something 😊";
setTimeout(()=>{
step2.style.display="none";
step3.style.display="block";
},1200);
}
}

/* STEP 3 */
function check3(){
if(code3.value.toLowerCase()==="watching movies"){
msg3.innerText="Seems like we truly connect 🎬✨";
setTimeout(()=>{
step3.style.display="none";
step4.style.display="block";
startConfession();

song.currentTime=0;
song.volume=0.4;
song.play();
},1200);
}
}

/* CONFESSION LINE BY LINE */
let lines=[
"I don't really know how to say this...",
"I've never said it before...",
"",
"But I felt like I should be honest.",
"",
"I like talking to you,",
"I like you 😊",
"",
"No pressure"
];

function startConfession(){
let i=0;
function show(){
if(i<lines.length){
confession.innerHTML+=lines[i]+"<br>";
i++;
setTimeout(show,900);
}
}
show();
}

/* NO BUTTON */
noBtn.onmouseover=()=>{
noBtn.style.left=Math.random()*window.innerWidth+"px";
noBtn.style.top=Math.random()*window.innerHeight+"px";
};
noBtn.onclick=()=>{
alert("It's okay 😊 I’ll try my best to be someone you might like someday 💖");
};

/* FINAL PAGE */
yesBtn.onclick=()=>{
step4.style.display="none";
finalYesPage.style.display="block";

let text="You are not just beautiful, you have such a wonderful vibe ✨";
text.split(" ").forEach((w,i)=>{
setTimeout(()=>{
finalText.innerHTML+=`<span class="word">${w}</span>`;
},i*250);
});

let para="I appreciate that you shared your hobbies with me and getting to know you has always been something I genuinely enjoy ☺️ You are supercalifragilisticexpialidocious 💖✨";
para.split(" ").forEach((w,i)=>{
setTimeout(()=>{
finalPara.innerHTML+=`<span class="word">${w}</span>`;
},i*180);
});
};

</script>

</body>
</html>
